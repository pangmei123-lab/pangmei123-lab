# ============================================================
# Navigation2 完整导航参数
# 机器人：四轮麦轮底盘 13cm×20cm，YDLIDAR 360° 8m
# ============================================================

amcl:
  ros__parameters:
    use_sim_time: false
    odom_frame_id: "odom"
    base_frame_id: "base_link"
    global_frame_id: "map"
    scan_topic_name: /scan
    laser_model_type: "likelihood_field"
    laser_likelihood_max_dist: 2.0
    laser_max_beams: 60
    laser_min_range: 0.12
    laser_max_range: 8.0
    laser_z_hit: 0.95
    laser_z_rand: 0.05
    laser_z_max: 0.05
    laser_z_short: 0.05
    laser_sigma_hit: 0.2
    min_particles: 500
    max_particles: 2000
    pf_err: 0.05
    pf_z: 0.99
    resample_interval: 2
    recovery_alpha_slow: 0.001
    recovery_alpha_fast: 0.1
    update_min_d: 0.2
    update_min_a: 0.2
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.4
    alpha4: 0.4
    transform_tolerance: 0.5
    tf_broadcast: true
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    default_nav_to_pose_bt_xml: "/opt/ros/humble/share/nav2_bt_navigator/behavior_trees/follow_point.xml"
    default_nav_through_poses_bt_xml: "/opt/ros/humble/share/nav2_bt_navigator/behavior_trees/follow_point.xml"
    plugin_lib_names:
      - "nav2_compute_path_to_pose_action_bt_node"
      - "nav2_follow_path_action_bt_node"
      - "nav2_goal_updater_node_bt_node"
      - "nav2_truncate_path_action_bt_node"
      - "nav2_rate_controller_bt_node"
      - "nav2_pipeline_sequence_bt_node"


controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.10
      yaw_goal_tolerance: 0.10
      stateful: true

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: true
      min_vel_x: -0.3
      min_vel_y: -0.3
      max_vel_x: 0.1
      max_vel_y: 0.3
      max_vel_theta: 0.5
      min_speed_xy: 0.0
      max_speed_xy: 0.1
      min_speed_theta: 0.0
      acc_lim_x: 0.5
      acc_lim_y: 0.5
      acc_lim_theta: 1.0
      dec_lim_x: 0.3
      dec_lim_y: 0.3
      dec_lim_theta: 0.5
      critics:
        - "RotateToGoal"
        - "Oscillation"
        - "BaseObstacle"
        - "GoalAlign"
        - "PathAlign"
        - "PathDist"
        - "GoalDist"
      BaseObstacle.scale: 0.02
      PathAlign.scale: 32.0
      PathAlign.forward_point_distance: 0.2
      GoalAlign.scale: 24.0
      GoalAlign.forward_point_distance: 0.2
      PathDist.scale: 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 1.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: true
      allow_unknown: true

global_costmap:
  ros__parameters:
    use_sim_time: false
    update_frequency: 1.0
    publish_frequency: 0.5
    global_frame: map
    robot_base_frame: base_link
    robot_radius: 0.15
    resolution: 0.05
    track_unknown_space: true
    always_send_full_costmap: true
    plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
    static_layer:
      plugin: "nav2_costmap_2d::StaticLayer"
      map_subscribe_transient_local: true
    obstacle_layer:
      plugin: "nav2_costmap_2d::ObstacleLayer"
      enabled: true
      observation_sources: scan
      scan:
        topic: /scan
        max_obstacle_height: 2.0
        clearing: true
        marking: true
        data_type: "LaserScan"
        raytrace_max_range: 3.0
        raytrace_min_range: 0.12
        obstacle_max_range: 2.5
        obstacle_min_range: 0.12
    inflation_layer:
      plugin: "nav2_costmap_2d::InflationLayer"
      inflation_radius: 0.30
      cost_scaling_factor: 3.0

local_costmap:
  ros__parameters:
    use_sim_time: false
    update_frequency: 5.0
    publish_frequency: 2.0
    global_frame: odom
    robot_base_frame: base_link
    robot_radius: 0.15
    resolution: 0.05
    rolling_window: true
    width: 3
    height: 3
    track_unknown_space: false
    always_send_full_costmap: false
    plugins: ["voxel_layer", "inflation_layer"]
    voxel_layer:
      plugin: "nav2_costmap_2d::VoxelLayer"
      enabled: true
      publish_voxel_map: true
      origin_z: 0.0
      z_resolution: 0.05
      z_voxels: 16
      max_obstacle_height: 2.0
      mark_threshold: 0
      observation_sources: scan
      scan:
        topic: /scan
        max_obstacle_height: 2.0
        clearing: true
        marking: true
        data_type: "LaserScan"
        raytrace_max_range: 3.0
        raytrace_min_range: 0.12
        obstacle_max_range: 2.5
        obstacle_min_range: 0.12
    inflation_layer:
      plugin: "nav2_costmap_2d::InflationLayer"
      inflation_radius: 0.30
      cost_scaling_factor: 3.0

