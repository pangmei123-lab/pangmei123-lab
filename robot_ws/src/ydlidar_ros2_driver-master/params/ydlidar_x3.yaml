ydlidar_ros2_driver_node:
  ros__parameters:
    port: /dev/ydlidar
    frame_id: lidar_laser_sensor
    ignore_array: ""
    baudrate: 115200
    lidar_type: 0
    device_type: 0
    sample_rate: 8
    abnormal_check_count: 4
    resolution_fixed: true
    reversion: false
    inverted: true
    auto_reconnect: true
    isSingleChannel: true
    intensity: false
    support_motor_dtr: true
    angle_max: 180.0
    angle_min: -180.0
    range_max: 8.0
    range_min: 0.12
    frequency: 10.00
    invalid_range_is_inf: false

